name: verify

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install verification tools
        run: |
          python -m pip install "pip>=26.1.2" "setuptools>=83.0.0"
          python -m pip install \
            "hatchling==1.28.0" \
            "build==1.4.0" \
            "ruff==0.14.14" \
            "mypy==1.19.1" \
            "pytest==9.0.3" \
            "pip-audit==2.10.0"
          python -m pip install --no-deps -e .
      - name: Lint and formatting
        run: |
          ruff check .
          ruff format --check .
      - name: Static typing
        run: mypy
      - name: Tests
        run: pytest
      - name: Build package
        run: python -m build
      - name: Dependency consistency
        run: python -m pip check
      - name: Vulnerability audit
        run: python -m pip_audit --skip-editable
