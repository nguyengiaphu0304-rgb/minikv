name: verify

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install verification tools
        run: |
          python -m pip install "pip>=26.1.2" "setuptools>=83.0.0"
          python -m pip install \
            "hatchling==1.28.0" \
            "build==1.4.0" \
            "ruff==0.14.14" \
            "mypy==1.19.1" \
            "pytest==9.0.3" \
            "pip-audit==2.10.0"
          python -m pip install --no-deps -e .
      - name: Lint and formatting
        run: |
          ruff check .
          ruff format --check .
      - name: Static typing
        run: mypy src scripts
      - name: Tests
        run: pytest
      - name: Reproducible release demo
        run: |
          python scripts/demo.py --output demo-output
          python scripts/demo.py --verify demo-output
      - name: Deterministic workload evidence
        run: |
          python scripts/workload_evidence.py \
            --baseline evidence/workload-v1.json \
            --output workload-observation.json
      - name: Upload workload observation
        uses: actions/upload-artifact@v4
        with:
          name: workload-observation-python-${{ matrix.python-version }}
          path: workload-observation.json
          if-no-files-found: error
          retention-days: 14
      - name: Build package
        env:
          SOURCE_DATE_EPOCH: "946684800"
        run: |
          mkdir dist-first dist-second dist
          python -m build --outdir dist-first
          python -m build --outdir dist-second
          gzip -cd dist-first/minikv_store-1.0.0.tar.gz |
            gzip -n -9 > dist-first/minikv_store-1.0.0.normalized.tar.gz
          mv dist-first/minikv_store-1.0.0.normalized.tar.gz \
            dist-first/minikv_store-1.0.0.tar.gz
          gzip -cd dist-second/minikv_store-1.0.0.tar.gz |
            gzip -n -9 > dist-second/minikv_store-1.0.0.normalized.tar.gz
          mv dist-second/minikv_store-1.0.0.normalized.tar.gz \
            dist-second/minikv_store-1.0.0.tar.gz
          cmp dist-first/minikv_store-1.0.0-py3-none-any.whl \
            dist-second/minikv_store-1.0.0-py3-none-any.whl
          cmp dist-first/minikv_store-1.0.0.tar.gz \
            dist-second/minikv_store-1.0.0.tar.gz
          cp dist-first/* dist/
          python scripts/verify_release.py --dist dist --write-checksums
      - name: Upload verified release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: minikv-v1.0.0-python-${{ matrix.python-version }}
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
            demo-output/manifest.json
            demo-output/summary.md
          if-no-files-found: error
          retention-days: 14
      - name: Dependency consistency
        run: python -m pip check
      - name: Vulnerability audit
        run: python -m pip_audit --skip-editable
